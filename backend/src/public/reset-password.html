<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña | GymBro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .msg {
      margin-top: 1rem;
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Restablecer Contraseña</h2>
    <p>Ingresá tu nueva contraseña.</p>

    <form id="resetForm" action="/api/auth/reset-password" method="POST">
      <input type="hidden" name="token" value="">
      <input type="hidden" name="email" value="">
      <label for="password">Nueva contraseña:</label>
      <input type="password" id="password" name="password" required>
      <label for="confirm">Confirmar contraseña:</label>
      <input type="password" id="confirm" name="confirm" required>
      <button type="submit">Restablecer contraseña</button>
    </form>

    <div id="message" class="msg"></div>
  </div>

  <script>
    // Tomar token y email de la URL y ponerlos en inputs ocultos
    const urlParams = new URLSearchParams(window.location.search);
    document.querySelector('input[name="token"]').value = urlParams.get('token');
    document.querySelector('input[name="email"]').value = urlParams.get('email');

    const form = document.getElementById("resetForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (password !== confirm) {
        message.textContent = "Las contraseñas no coinciden.";
        message.className = "msg error";
        return;
      }

      const token = document.querySelector('input[name="token"]').value;
      const email = document.querySelector('input[name="email"]').value;

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, email, password }),
        });

        const data = await res.json();
        if (res.ok) {
          message.textContent = data.message || "Contraseña actualizada correctamente.";
          message.className = "msg";
          form.reset();
        } else {
          message.textContent = data.message || "Error al actualizar la contraseña.";
          message.className = "msg error";
        }
      } catch (err) {
        message.textContent = "Error en la conexión con el servidor.";
        message.className = "msg error";
      }
    });
  </script>
</body>
</html>
